
<!DOCTYPE html>
<html>
<body>

<canvas id="cv" width="400" height="200"
style="border:1px solid black"></canvas>

<script src="app.js"></script>

<script>
const ctx =
document.getElementById("cv").getContext("2d");

subscribe(model=>{
    ctx.clearRect(0,0,400,200);
    ctx.beginPath();
    ctx.arc(model.x,100,20,0,Math.PI*2);
    ctx.fill();
});
</script>

</body>
</html>
